server:
  port: 9090

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${DB_HOST_PAYMENT:localhost}:3306/payments?createDatabaseIfNotExist=true
    username: ${DB_USERNAME_PAYMENT:springstudent}
    password: ${DB_PASSWORD_PAYMENT:springstudent}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

services:
  booking:
    url: http://localhost:8080

razorpay:
  key-id: your_api_test_key
  key-secret: your_api_key_secret
  callback-url: http://localhost:8765/payments
